[build]
  publish = "public"
  command = "npm install"  # Instala dependencias functions

[functions]
  directory = "netlify/functions"  # ← IMPORTANTE

[[redirects]]
  # API Routes → Netlify Functions
  from = "/api/*"
  to = "/.netlify/functions/api/server/:splat"
  status = 200
  force = true

[[redirects]]  
  from = "/auth/*"
  to = "/.netlify/functions/api/server/auth/:splat"
  status = 200
  force = true

[[redirects]]
  # Frontend SPA routing
  from = "/*"
  to = "/index.html"
  status = 200